<p>rustup换源（中科大源）：<br>在<code>.bashrc</code>中写入：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><code class="hljs bash"><span class="hljs-built_in">export</span> RUSTUP_DIST_SERVER=https://mirrors.ustc.edu.cn/rust-static<br><span class="hljs-built_in">export</span> RUSTUP_UPDATE_ROOT=https://mirrors.ustc.edu.cn/rust-static/rustup<br></code></pre></td></tr></table></figure>

<p>cargo换源：<br>新建（或编辑已有）文件<code>～/.cargo/config</code>，写入：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><code class="hljs bash">[source.crates-io]<br>registry = <span class="hljs-string">&quot;https://github.com/rust-lang/crates.io-index&quot;</span><br>replace-with = <span class="hljs-string">&#x27;ustc&#x27;</span><br>[source.ustc]<br>registry = <span class="hljs-string">&quot;https://mirrors.ustc.edu.cn/crates.io-index/&quot;</span><br></code></pre></td></tr></table></figure>

<p>如果cargo版本小于0.13.0，在开头添加：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><code class="hljs bash">[registry]<br>index = <span class="hljs-string">&quot;https://mirrors.ustc.edu.cn/crates.io-index/&quot;</span><br></code></pre></td></tr></table></figure>
