<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs plain">pacman -S archlinuxcn-keyring<br></code></pre></td></tr></table></figure>

<p>更新系统</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs plain">pacman -Syu<br></code></pre></td></tr></table></figure>

<h2 id="配置桌面"><a href="#配置桌面" class="headerlink" title="配置桌面"></a>配置桌面</h2><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><code class="hljs bash">pacman -S xorg<br>pacman -S xorg-xinit<br>cp /etc/X11/xinit/xinitrc ~/.xinitrc<br>pacman -S awesome<br>pacman -S xterm<br></code></pre></td></tr></table></figure>

<p>配置zsh</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><code class="hljs bash">pacman -S zsh<br>chsh -s /bin/zsh<br>pacman -S oh-my-zsh-git<br>cp /usr/share/oh-my-zsh/zshrc ~/.zshrc<br><span class="hljs-comment">## 修改主题后，重新加载</span><br><span class="hljs-built_in">source</span> ~/.zshrc<br><span class="hljs-comment">## 安装字体</span><br>pacman -S ttf-monaco<br>pacman -S wqy-microhei<br></code></pre></td></tr></table></figure>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><code class="hljs plain">! .Xresources<br>! Xterm settings<br>! XTerm*vt100*reverseVideo: true<br><br>XTerm*vt100.background: black<br>XTerm*vt100.foreground: white<br><br>! copy &amp; paste <br>XTerm*VT100.translations: #override &lt;Btn1Up&gt;: select-end(PRIMARY, CLIPBOARD, CUT_BUFFER0) <br><br>! English font <br>xterm*faceName: Monaco:antialias&#x3D;True:pixelsize&#x3D;15<br>! Chinese font <br>xterm*faceNameDoublesize:WenQuanYi Micro Hei:antialias&#x3D;True:pixelsize&#x3D;15<br><br>!input method <br>XTerm*inputMethod:fcitx <br><br>! scrollbar <br>XTerm*scrollBar: true <br>XTerm*rightScrollBar: true <br>XTerm*SaveLines: 4096<br><br>! Xterm*faceSize: 20<br>Xterm*VT100*geometry: 100x30<br></code></pre></td></tr></table></figure>
