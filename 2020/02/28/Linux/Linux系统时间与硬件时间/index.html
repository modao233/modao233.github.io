	<div class="content">
		<p>最近在虚拟机里更新软件时遇到了一个问题导致无法获取更新，经排查后发现是因为我当时是暂停虚拟机而不是关闭，导致系统时间暂停，系统时间和软件镜像源源不一致，导致无法获取更新。</p>
<a id="more"></a>

<h3 id="查看系统时间："><a href="#查看系统时间：" class="headerlink" title="查看系统时间："></a>查看系统时间：</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs plain">date<br></code></pre></td></tr></table></figure>

<h3 id="设置系统时间："><a href="#设置系统时间：" class="headerlink" title="设置系统时间："></a>设置系统时间：</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs plain">date -s + 时间<br></code></pre></td></tr></table></figure>

<h3 id="设置系统时间和日期："><a href="#设置系统时间和日期：" class="headerlink" title="设置系统时间和日期："></a>设置系统时间和日期：</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs plain">date -s &quot;2018&#x2F;8&#x2F;8 10:00:00&quot;<br></code></pre></td></tr></table></figure>

<h3 id="查看硬件时间："><a href="#查看硬件时间：" class="headerlink" title="查看硬件时间："></a>查看硬件时间：</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs plain">hwclock 或 clock<br></code></pre></td></tr></table></figure>

<h3 id="将系统时间写入到硬件时间："><a href="#将系统时间写入到硬件时间：" class="headerlink" title="将系统时间写入到硬件时间："></a>将系统时间写入到硬件时间：</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs plain">hwclock -w<br></code></pre></td></tr></table></figure>

<h3 id="将硬件时间写入到系统时间："><a href="#将硬件时间写入到系统时间：" class="headerlink" title="将硬件时间写入到系统时间："></a>将硬件时间写入到系统时间：</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs plain">hwclock -s<br></code></pre></td></tr></table></figure>
