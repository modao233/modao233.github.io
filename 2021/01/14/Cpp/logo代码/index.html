<script>
    function setClipboardText(event){
        
        let clipboardData = event.clipboardData || window.clipboardData;
        
        if (!clipboardData) { return; }
        event.preventDefault();
        
        let text = window.getSelection().toString();
		    
        if (text) {
            
            event.preventDefault();
            
            var copyright = '\n\n'
            + '\nдҪңе“ҒйҮҮз”Ё зҹҘиҜҶе…ұдә«зҪІеҗҚ-йқһе•ҶдёҡжҖ§дҪҝз”Ё-зӣёеҗҢж–№ејҸе…ұдә« 4.0 еӣҪйҷ…и®ёеҸҜеҚҸи®® иҝӣиЎҢи®ёеҸҜ'
            + '\nи‘—дҪңжқғеҪ’дҪңиҖ…жүҖжңүпјҢе•ҶдёҡиҪ¬иҪҪиҜ·иҒ”зі»дҪңиҖ…иҺ·еҫ—жҺҲжқғпјҢйқһе•ҶдёҡиҪ¬иҪҪиҜ·жіЁжҳҺеҮәеӨ„гҖӮ'
            + '\nдҪңиҖ…: modao'
            + '\nйӮ®з®ұ: rustacean@aliyun.com'
            + '\nеҺҹж–Үең°еқҖ: https://modao233.github.io/2021/01/14/Cpp/logo%E4%BB%A3%E7%A0%81/'
			
            clipboardData.setData('text/plain', text + copyright);
    
        }
    };
	
    var contents = document.getElementsByClassName("content-area");
   
    contents[0].addEventListener('copy',function(e){
        setClipboardText(e);
    });

</script>
